spring:
  application:
    name: document-service
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/readpdfs_document?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USER:readpdfs}
    password: ${DB_PASSWORD:readpdfs}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

services:
  extraction:
    base-url: ${EXTRACTION_SERVICE_URL:http://localhost:8082}
